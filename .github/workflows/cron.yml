# make a cron job for updating the pdfs every day

name: Daily PDF Upload

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at 00:00 UTC
    

jobs:
  upload-pdfs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Create PDFs directory
        run: mkdir -p ./pdfs
        
      - name: Download PDF
        run: |
          set -e
          curl -L -o ./pdfs/me.pdf https://storage.rxresu.me/clz62ydvs5a9cvrn3hvbh93tp/resumes/me.pdf
          curl -L -o ./pdfs/me_spanish.pdf https://storage.rxresu.me/clz62ydvs5a9cvrn3hvbh93tp/resumes/me_spanish.pdf

      - name: Set up repository
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Upload PDFs
        run: |
          git add pdfs/me.pdf pdfs/me_spanish.pdf
            git commit -m "Daily PDF upload [$(date '+%b %dth, %Y')]"
          git push


