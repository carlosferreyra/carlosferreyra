name: Update Portfolio

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */1 * * *" # Runs every hour

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_ACCESS_TOKEN: ${{ secrets.GH_ACTIONS }}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run portfolio
      # - run: npm run update-pages
      - run: |
          git config user.name carlosferreyra
          git config user.email eduferreyraok@gmail.com
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "[bot] Update repo with latest info"
          git push origin main
