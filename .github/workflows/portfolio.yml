name: Update Portfolio
on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *" # Runs 5 minutes

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Update Portfolio
        run: npm run update-portfolio
      - name: Commit and push changes
        run: |
          git config user.name carlosferreyra
          git config user.email eduferreyraok@gmail.com
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "[bot] Update repo with latest info"
          git push origin main
