name: Update CNAME Files

env:
  CNAME_URL: $(cat CNAME)
  GITHUB_API_URL: https://api.github.com
  USER_NAME: 'github-actions[bot]'
  USER_EMAIL: 'github-actions[bot]@users.noreply.github.com'
  PER_PAGE: 100

on:
  workflow_dispatch:  # Allows manual triggering

jobs:

  update-cnames:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.update-cnames.outputs.status }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up GitHub bot permissions
        run: |
          git config --global user.name '${{ env.USER_NAME }}'
          git config --global user.email '${{ env.USER_EMAIL }}'
          git config --global credential.helper 'store --file ~/.git-credentials'
            echo "https://${{ secrets.ACTIONS_TOKEN }}:@github.com" > ~/.git-credentials

      - name: Update CNAME files
        id: update-cnames
        run: |
          set -e
          UPDATED_COUNT=0
          FAILED_COUNT=0
          FAILED_REPOS=""
          
          curl -H "Authorization: token ${{ secrets.ACTIONS_TOKEN }}" \
               -H "Accept: application/vnd.github.v3+json" \
               "${{ env.GITHUB_API_URL }}/user/repos?per_page=${{ env.PER_PAGE }}" > repos.json

          for repo in $(jq -r '.[].clone_url' repos.json); do
            echo "Processing $repo"
            git clone $repo
            repo_name=$(basename $repo .git)
            
            if [ ! -f "$repo_name/CNAME" ] || [ "$(cat $repo_name/CNAME)" != "${{ env.CNAME_URL }}" ]; then
              echo "${{ env.CNAME_URL }}" > $repo_name/CNAME
              git -C $repo_name add CNAME
              git -C $repo_name commit -m "🌐 CNAME Update [$(date '+%Y-%m-%d %H:%M:%S UTC')] - Set to ${{ env.CNAME_URL }}"
              
              if git -C $repo_name push 2>/dev/null; then
                ((UPDATED_COUNT++))
                echo "✅ Successfully updated $repo_name"
              else
                ((FAILED_COUNT++))
                FAILED_REPOS="$FAILED_REPOS\n- $repo_name (protected branch or insufficient permissions)"
                echo "❌ Failed to update $repo_name - likely protected"
              fi
            fi
          done
          
          rm -rf repos.json
          echo "status=updated_${UPDATED_COUNT}_failed_${FAILED_COUNT}" >> $GITHUB_OUTPUT
          
          echo "📊 Summary:"
          echo "- Successfully updated: $UPDATED_COUNT repos"
          echo "- Failed to update: $FAILED_COUNT repos"
          if [ ! -z "$FAILED_REPOS" ]; then
            echo -e "Failed repositories:$FAILED_REPOS"
          fi