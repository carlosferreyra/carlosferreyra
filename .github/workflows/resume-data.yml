name: Build Resume (rxresu.me + PDF)

on:
  push:
    branches: [main]
    paths:
      - 'resume.json'
      - 'resume.schema.json'
      - 'data/themes.json'
      - 'silver-dev-cv/cv.typ.j2'
      - 'scripts/resume.py'
      - 'scripts/resume_core.py'
      - 'scripts/build_readme.py'
      - 'scripts/resume_push.py'
      - 'scripts/resume_pdf.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0

      - uses: typst-community/setup-typst@v5.1.0
        with:
          typst-version: ^0.14.0
          cache-local-packages: true

      - name: Test labeled resume resolution
        run: uv run python -m unittest discover -s tests -v

      - name: Validate and build resume outputs
        run: uv run scripts/resume.py build

      - name: Push resolved resumes to rxresu.me
        env:
          RXRESUME_BASE_URL: https://rxresu.me/api/openapi
          RXRESUME_TOKEN: ${{ secrets.RXRESUME_TOKEN }}
          RXRESUME_USERNAME: ${{ vars.RXRESUME_USERNAME }}
        run: uv run scripts/resume.py rxresume --apply

      - name: Commit generated README + PDFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: README.md resume/*.pdf
          commit_message: 'chore: rebuild README and PDFs & push to rxresu.me [skip ci]'
